<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-main: #FAFAFA;
  --bg-dark: #111111;

  --text-main: #111111;
  --text-light: #FFFFFF;

  --accent: #D6B98C;

  --gray-main: #555555;
  --gray-light: #888888;
  --gray-border: #E5E5E5;
}

body {
  margin: 0;
  font-family: 'Manrope', sans-serif;
}

.intro {
 min-height: 100vh;
  background:
    radial-gradient(circle at 50% 30%, #f5f5f5 0%, #ececec 45%, #e4e4e4 100%);
  color: var(--text-main);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 0 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
  
}


#typing {
  font-size: clamp(3.5rem, 8vw, 6.5rem);
  font-weight: 800;
  letter-spacing: -0.05em;
  line-height: 0.95;
  margin: 0;
  min-height: 1.1em;
}

#typing::after {
  content: "|";
  animation: blink 0.8s steps(1) 6.5 forwards;
  margin-left: 4px;
  color: var(--accent);

}

@media (max-width: 600px){
  #typing{
    text-align: left;
    font-size: 4.2rem;
    font-weight: 700;
  }
}


.dot{

  animation: colorChange 0.5s ease forwards;
  animation-delay: 2s;

}
.subtitle {
  margin-top: 18px;
  font-size: clamp(1.4rem, 3.2vw, 3rem);
  font-weight: 700;
  line-height: 1.45;
  opacity: 0;
  transform: translateY(10px);
  animation: fadeUp 1.2s ease forwards;
  animation-delay: 2.2s;
  background: linear-gradient(90deg, #222 0%, #666 45%, #999 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

@media (max-width: 600px){
  .subtitle{
    text-align: left;
    font-size: 1.8rem;
    padding-top: 0.5em;
  }
}

.enter-btn {
  margin-top: 50px;
  color: var(--text-main);
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0;
  transform: translateY(10px);
  animation: fadeUp 0.8s ease forwards;
  animation-delay: 2.6s;
  position: relative;
  padding-bottom: 6px;
  

}



.enter-btn::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: 0;
  width: 100%;
  height: 1px;
  background: var(--text-main);
  transform: scaleX(0.6);
  transform-origin: center;
  transition: transform 0.3s ease;
  opacity: 0.7;
  
}

.enter-btn:hover::after {
  transform: scaleX(1);
}

@media (max-width: 600px){
  .enter-btn{
    scale: 1.2;
    margin-top: 10em;
    padding-top: 1em;
    
  }

  .enter-btn::after{
    opacity: 0.5;
  }
}
.arrow{
  color: var(--accent);
  display: inline-block;
  margin-left: 6px;
  margin-right: 6px;
  opacity: 0;
  transform: translateY(10px);
  animation: fadeUp 1.2s ease forwards,
  scrolMove 1.6s ease-in-out infinite;
  animation-delay: 2.6s;
}
.main {
  min-height: 100vh;
  background: #FAFAFA;
  color: #111111;
  padding: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
}

@keyframes blink {
  0%,
  49% {
    opacity: 1;
  }
  50%,
  100% {
    opacity: 0;
  }
 
}

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}



@keyframes scrolMove {
  0% {
    transform: translateY(0px);
  }

  50% {
    transform: translateY(4px);
  }

  100% {
    transform: translateY(0px);
  }

}


@keyframes colorChange {
  0% {
    color: #111111;
  }

 

  100% {
    color: #D6B98C;
  }

}

.light {
  background: var(--bg-main);
  color: var(--text-main);
  padding: 60px;
}

.dark {
  background: var(--bg-dark);
  color: var(--text-light);
  padding: 60px;
}

.button {
  border: 1px solid var(--accent);
  color: var(--accent);
  padding: 10px 20px;
  display: inline-block;
  margin-top: 20px;
}

.button:hover {
  background: var(--accent);
  color: #111;
}

.cords{
  position: absolute;
  top:  97vh;
  margin: 0;
  padding: 0;
  letter-spacing: 0.1em;
  color: var(--gray-main);
}



@media (max-width: 600px){
  .cords{
    scale: 0.9;
    
  }
}
</style>
</head>
<body>

<section class="intro">
  <h1 id="typing"></h1>
  <p class="subtitle">Learning. Building. Improving.</p>
  <a href="#" class="enter-btn" id="scrollBtn"> Explore </a>
  <span class="arrow">↓</span>

  <div class="cords">[51.25° N, 22.57° E]</div>
  
</section>

<section id="main" class="main">
  
  <img style="width: 10em;" src="coming-soon.png" alt="">
  
</section>

<section class="dark">
</section>

<script>
  const text = "Wojciech Targonski.";
  const typingElement = document.getElementById("typing");

  let index = 0;

  function typeLetter() {
    if (index < (text.length)) {
      typingElement.textContent += text.charAt(index);
      index++;
      setTimeout(typeLetter, 100);
    }
    else{
      const fullText = typingElement.textContent;

      typingElement.innerHTML =
        fullText.slice(0, -1) +
        '<span class="dot">.</span>';
   
    }
  }

  
  typeLetter();
  


  const scrollBtn = document.getElementById("scrollBtn");
  const targetSection = document.getElementById("main");

  scrollBtn.addEventListener("click", function(e) {
    e.preventDefault();

    const target = targetSection.offsetTop;
    const start = window.scrollY;
    const duration = 1600;
    let startTime = null;

    function easeInOutQuad(t) {
      return t < 0.5
        ? 2 * t * t
        : 1 - Math.pow(-2 * t + 2, 2) / 2;
    }

    function animateScroll(currentTime) {
      if (!startTime) startTime = currentTime;

      const timeElapsed = currentTime - startTime;
      const progress = Math.min(timeElapsed / duration, 1);
      const easedProgress = easeInOutQuad(progress);

      window.scrollTo(0, start + (target - start) * easedProgress);

      if (timeElapsed < duration) {
        requestAnimationFrame(animateScroll);
      }
    }

    requestAnimationFrame(animateScroll);
  });
</script>

</body>
</html>
